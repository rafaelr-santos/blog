<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
        <title>Blog</title>
        
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    </head>
    <body>
        <div id="wrapper-principal">
            <header id="wrapper-header-principal">
            </header>
            <main id="wrapper-main-principal" class="mx-auto">
                <div class="container">
                    <div class="row">
                        <div class="col-12">
                            <div class="card text-black bg-transparent">
                                <div class="card-body">
                                    <h2 class="card-title">Comunicação entre Gerações</h2>
                                    <h6 class="card-subtitle mb-2">18/02/2020-18/02/2020</h6>
                                    <p class="card-text fs-6">
                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">O que ouvimos e aprendemos, o que os nossos pais nos contaram não o encobriremos a seus filhos contaremos à geração vindoura os louvores do Senhor, e o seu poder, e as maravilhas que fez.</p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>Salmos 78, 3-4 NAA</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    Ponham estas minhas palavras no seu coração e na sua alma. Amarrem-nas como sinal na mão, para que sejam por frontal entre os olhos. 19Ensinem essas palavras aos seus filhos, falando delas quando estiverem sentados em casa, andando pelo caminho, quando se deitarem e quando se levantarem.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>Deuteronômio 11, 18</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    Meu filho, ouça o ensino de seu pai e não despreze a instrução de sua mãe. Porque serão um diadema de graça para a sua cabeça e colares para o seu pescoço.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>Provérbios 1, 8</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    Meu filho, guarde o mandamento de seu pai e não abandone a instrução de sua mãe. Tenha-os sempre amarrados ao seu coração, pendure-os no seu pescoço. Quando você andar, essa instrução o guiará; quando você se deitar, ela o guardará; quando acordar, falará com você.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>Provérbios 6, 20</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    Não repreenda um homem mais velho; pelo contrário, exorte-o como você faria com o seu pai. Trate os mais jovens como irmãos, 2as mulheres mais velhas, como mães, e as mais jovens, como irmãs, com toda a pureza.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>I Timóteo 5, 1</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    Quanto aos homens idosos, que sejam moderados, respeitáveis, sensatos, sadios na fé, no amor e na perseverança. Do mesmo modo, quanto às mulheres idosas, que tenham conduta reverente, não sejam caluniadoras, nem escravizadas a muito vinho. Que sejam mestras do bem, a fim de instruírem as jovens recém-casadas a amar o marido e os filhos, a serem sensatas, puras, boas donas de casa, bondosas, sujeitas ao marido, para que a palavra de Deus não seja difamada. Do mesmo modo, quanto aos mais jovens, exorte-os para que, em todas as coisas, sejam moderados.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>Tito 2, 2-6</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    Não pensem que eu vim trazer paz à terra; não vim trazer paz, mas espada. 35Pois vim causar divisão entre o homem e o seu pai; entre a filha e a sua mãe e entre a nora e a sua sogra.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>Mateus 10, 34-35</cite>
                                            </figcaption>
                                        </figure>

                                        <figure>
                                            <blockquote class="blockquote">
                                                <p class="fs-6">
                                                    A mãe dele, que era filha de Onri, se chamava Atalia. Acazias também andou nos caminhos da casa de Acabe, porque a mãe dele o aconselhava a cometer iniquidades.
                                                </p>
                                            </blockquote>
                                            <figcaption class="blockquote-footer">
                                                <cite>II Crônicas 22, 3</cite>
                                            </figcaption>
                                        </figure>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div> 
    </body>
</html>
